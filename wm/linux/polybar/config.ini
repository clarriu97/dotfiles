[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bar1]
width = 100%
height = 22pt
offset-x = 5%
offset-y = 1%
radius = 9
fixed-center = true
button = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin-left = 1
module-margin-right = 2

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Hack Nerd Font: size=11;2"
font-1 = "FontAwesome: size=13;4"
font-2 = "Hack Nerd Font: size=11;2"
font-3 = "Hack Nerd Font: size=11;2"

;modules-left = xworkspaces xwindow
modules-left = xworkspaces
;modules-center =
modules-right = wlan eth filesystem pulseaudio memory cpu battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name% %icon%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 2

label-occupied = %name% %icon%
label-occupied-padding = 2

label-urgent = %name% %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name% %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

disable-underline = true

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}ÔáÄ %mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄ® VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "muted"
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔĒł RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 2
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
; Interface auto-detected and exported by launch.sh (fallback: wlan0)
interface = ${env:WLAN_IFACE:wlan0}
label-connected = %{F#F0C674}Ôáę%{F-}  %essid% %local_ip% %{F#F0C674} ÔÄô %downspeed:1% Ôāď %upspeed:1%%{F-}
label-disconnected =
tail=true

[module/eth]
inherit = network-base
interface-type = wired
; Interface auto-detected and exported by launch.sh (fallback: eth0)
interface = ${env:ETH_IFACE:eth0}
label-connected = %{F#F0C674}ÔõŅ%{F-}  %local_ip% %{F#F0C674} ÔÄô %downspeed:1% Ôāď %upspeed:1%%{F-}
label-disconnected =
tail=true

[module/date]
type = internal/date
interval = 1

date-alt = %H:%M
date = %d-%m-%Y %H:%M

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/battery]
type = internal/battery

full-at = 99
low-at = 5

; Battery/adapter auto-detected and exported by launch.sh.
; List manually with: ls -1 /sys/class/power_supply/
battery = ${env:BATTERY:BAT0}
adapter = ${env:ADAPTER:ADP1}

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = Charging %percentage%%
label-discharging = Discharging %percentage%%
label-full = Fully charged
label-low = BATTERY LOW
; Only applies if <ramp-capacity> is used
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
bar-capacity-width = 10
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750
animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
animation-discharging-framerate = 500