# .aerospace.toml — i3-like tiling window manager for macOS.
# Equivalent to the i3/config on Linux. Docs: https://nikitabobko.github.io/AeroSpace/guide
#
# ---------------------------------------------------------------------------
#  Modifier key (READ THIS)
# ---------------------------------------------------------------------------
#  The window-manager modifier is the LEFT Option key.
#
#  Karabiner-Elements turns LEFT Option into Ctrl+Option (see
#  wm/macos/karabiner/karabiner.json), so every binding below is written as
#  `ctrl-alt-*`. In practice you just hold the LEFT Option key, like the Super
#  key in i3.
#
#  The RIGHT Option key is left completely untouched, so on a Spanish keyboard
#  you use it for @ # [ ] { } \ | ~ etc. — exactly like AltGr on Linux.
#
#  Layers:
#    ctrl-alt            → LEFT Option            (focus, workspaces, launch)
#    ctrl-alt-shift      → LEFT Option + Shift    (move window / send to ws)
#    ctrl-alt-cmd        → LEFT Option + Cmd      (move workspace to monitor)

after-startup-command = [
    'exec-and-forget sketchybar',
    # JankyBorders: colored border around the focused window (like i3 focus).
    'exec-and-forget borders active_color=0xff7aa2f7 inactive_color=0xff414868 width=6.0',
]
start-at-login = true

# Container normalization (natural i3-like behavior)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Notify SketchyBar when the workspace changes (bar highlight)
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ===========================================================================
#  Gaps — per-monitor top gap so windows never overlap SketchyBar.
#  A notched built-in display already reserves the top strip, so it needs a
#  small gap; external displays need a gap the size of the bar (~40px) + air.
#  If you see windows under the bar, raise the value; too much air, lower it.
# ===========================================================================
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.bottom = 8
outer.top = [
    { monitor.'built-in' = 10 },   # MacBook built-in (notched) display
    50,                            # any external / non-notched display
]

# ===========================================================================
#  Main mode (key bindings) — modifier = LEFT Option (see header)
# ===========================================================================
[mode.main.binding]
# Terminal (i3: $mod+Return) and app launchers
ctrl-alt-enter = 'exec-and-forget open -na Warp'
ctrl-alt-shift-v = 'exec-and-forget open -na "Visual Studio Code"'
ctrl-alt-shift-b = 'exec-and-forget open -na "Brave Browser"'
ctrl-alt-shift-s = 'exec-and-forget flameshot gui'   # screenshot (i3: $mod+Ctrl+s)
# Note: the app launcher (rofi on i3) is covered by Spotlight (Cmd+Space) or Raycast.

# Close window (i3: $mod+Shift+q)
ctrl-alt-shift-q = 'close'

# Change focus (i3: $mod+h/j/k/l). hjkl = left/down/up/right.
ctrl-alt-h = 'focus left'
ctrl-alt-j = 'focus down'
ctrl-alt-k = 'focus up'
ctrl-alt-l = 'focus right'

# Move window (i3: $mod+Shift+...)
ctrl-alt-shift-h = 'move left'
ctrl-alt-shift-j = 'move down'
ctrl-alt-shift-k = 'move up'
ctrl-alt-shift-l = 'move right'

# Layouts (i3: stacking/tabbed/split/fullscreen)
ctrl-alt-slash = 'layout tiles horizontal vertical'    # toggle tiles orientation
ctrl-alt-comma = 'layout accordion horizontal vertical'
ctrl-alt-f = 'fullscreen'
ctrl-alt-shift-space = 'layout floating tiling'        # tiling <-> floating

# Workspaces 1..10 (i3: $mod+number)
ctrl-alt-1 = 'workspace 1'
ctrl-alt-2 = 'workspace 2'
ctrl-alt-3 = 'workspace 3'
ctrl-alt-4 = 'workspace 4'
ctrl-alt-5 = 'workspace 5'
ctrl-alt-6 = 'workspace 6'
ctrl-alt-7 = 'workspace 7'
ctrl-alt-8 = 'workspace 8'
ctrl-alt-9 = 'workspace 9'
ctrl-alt-0 = 'workspace 10'
ctrl-alt-tab = 'workspace-back-and-forth'              # i3: $mod+Tab

# Move container to workspace (i3: $mod+Shift+number)
ctrl-alt-shift-1 = 'move-node-to-workspace 1'
ctrl-alt-shift-2 = 'move-node-to-workspace 2'
ctrl-alt-shift-3 = 'move-node-to-workspace 3'
ctrl-alt-shift-4 = 'move-node-to-workspace 4'
ctrl-alt-shift-5 = 'move-node-to-workspace 5'
ctrl-alt-shift-6 = 'move-node-to-workspace 6'
ctrl-alt-shift-7 = 'move-node-to-workspace 7'
ctrl-alt-shift-8 = 'move-node-to-workspace 8'
ctrl-alt-shift-9 = 'move-node-to-workspace 9'
ctrl-alt-shift-0 = 'move-node-to-workspace 10'

# Move workspace between monitors (i3: $mod+Ctrl+>/<)
ctrl-alt-cmd-l = 'move-workspace-to-monitor --wrap-around next'
ctrl-alt-cmd-h = 'move-workspace-to-monitor --wrap-around prev'

# Reload config (i3: $mod+Shift+c) and resize mode (i3: $mod+r)
ctrl-alt-shift-c = 'reload-config'
ctrl-alt-r = 'mode resize'

# ===========================================================================
#  Resize mode (i3: mode "resize")
# ===========================================================================
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# ===========================================================================
#  Assign apps to workspaces (i3: assign / for_window)
# ===========================================================================
[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 10'
